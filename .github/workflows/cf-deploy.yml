name: Test and Deploy

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read

env:
  NODE_VERSION: 24

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Configure npm auth for GitHub Packages
        run: |
          echo "@capire:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    concurrency:
      group: cf-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Configure npm auth for GitHub Packages
        run: |
          echo "@capire:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}

      - name: Install dependencies
        run: npm ci

      - name: Build MTAR
        run: npx mbt build -p=cf

      - name: Install Cloud Foundry CLI
        run: |
          sudo mkdir -p /usr/share/keyrings
          curl -fsSL https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/cli.cloudfoundry.org.gpg
          echo "deb [signed-by=/usr/share/keyrings/cli.cloudfoundry.org.gpg] https://packages.cloudfoundry.org/debian stable main" \
            | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install -y cf8-cli

      - name: Install MultiApps plugin
        run: |
          cf add-plugin-repo CF-Community https://plugins.cloudfoundry.org
          cf install-plugin multiapps -f
          cf plugins

      - name: Login to Cloud Foundry
        run: cf login -a "$CF_API" -u "$CF_USERNAME" -p "$CF_PASSWORD" -o "$CF_ORG" -s "$CF_SPACE"
        env:
          # Repository secrets shared by all environments.
          CF_API: ${{ secrets.CF_API }}
          CF_USERNAME: ${{ secrets.CF_USERNAME }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
          CF_ORG: ${{ secrets.CF_ORG }}
          # Environment secret from the selected GitHub Environment: dev or prod.
          CF_SPACE: ${{ secrets.CF_SPACE }}

      - name: Deploy
        id: deploy
        run: |
          set +e
          cf deploy mta_archives/*.mtar -f --version-rule ALL 2>&1 | tee deploy.log
          deploy_status=${PIPESTATUS[0]}
          set -e

          operation_id="$(sed -n 's/^Operation ID: //p' deploy.log | tail -1)"
          if [ -z "$operation_id" ]; then
            operation_id="$(sed -n 's/.*cf deploy -i \([^ ]*\) -a abort.*/\1/p' deploy.log | tail -1)"
          fi

          echo "operation_id=$operation_id" >> "$GITHUB_OUTPUT"

          exit "$deploy_status"

      - name: Download logs and abort failed MTA operation
        if: failure() && steps.deploy.outputs.operation_id != ''
        run: |
          cf dmol -i "${{ steps.deploy.outputs.operation_id }}" || true
          cf deploy -i "${{ steps.deploy.outputs.operation_id }}" -a abort || true

      - name: Upload MTA operation logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mta-operation-logs-${{ github.run_id }}
          path: |
            deploy.log
            mta-op-*
          if-no-files-found: warn
