<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Genres</title>
  <style>
    html, body, #content {
      height: 100%;
      margin: 0;
    }
  </style>
  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-libs="sap.m,sap.fe.templates"
    data-sap-ui-compat-version="edge"
    data-sap-ui-async="true"
    data-sap-ui-flexibility-services='[{"connector":"LocalStorageConnector"}]'
    data-sap-ui-resourceroots='{"bookshop.genres":"./"}'></script>
  <script>
    sap.ui.getCore().attachInit(function () {
      sap.ui.require(["sap/ui/core/ComponentContainer"], function (ComponentContainer) {
        new ComponentContainer({
          name: "bookshop.genres",
          height: "100%",
          async: true
        }).placeAt("content");
      });
    });
  </script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content"></body>
</html>
